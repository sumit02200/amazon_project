<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title>Amazon</title>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav_logo border">
                <div class="logo">

                </div>
            </div>
            <div class="nav_address border">
                <p class="add_first">Deliver to</p>
                <div class="add_icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add_sec">India</p>
                </div>
            </div>
            <div class="nav_search">
                <select class="search_select">
                    <option>All</option>
                </select>
                <input type="text" placeholder="Amazon Search" class="search_input">
                <div class="search_icon"><i class="fa-solid fa-magnifying-glass"></i></div>
            </div>
            <div class="nav_signin border">
                <p><span class="nav_first">Hello, sign in</span></p>
                <p class="nav_second">Account & Lists</p>
            </div>
            <div class="nav_return border">
                <p><span class="nav_first">Returns</span></p>
                <p class="nav_second">& Orders</p>
            </div>
            <div class="nav_cart border">
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>
        </div>
    </header>
</body>
</html>
